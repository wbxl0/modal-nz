          - 'westcentralus | AZR 怀俄明州'
          # ====== 美国南部 US-SOUTH ======
          - 'us-south | 美国南部（自动分配）'
          - 'us-south1 | GCP 达拉斯'
          # ====== 美国西部 US-WEST ======
          - 'us-west | 美国西部（自动分配）'
          - 'us-west-1 | AWS 加利福尼亚'
          - 'us-west-2 | AWS 俄勒冈州'
          - 'us-west1 | GCP 俄勒冈州'
          - 'us-west2 | GCP 洛杉矶'
          - 'us-west3 | GCP 盐湖城'
          - 'us-west4 | GCP 拉斯维加斯'
          - 'us-sanjose-1 | OCI 圣何塞'
          - 'westus | AZR 加利福尼亚'
          - 'westus2 | AZR 华盛顿州'
          - 'westus3 | AZR 亚利桑那州'
          # ====== 欧洲西部 EU-WEST ======
          - 'eu-west | 欧洲西部（自动分配）'
          - 'eu-central-1 | AWS 法兰克福'
          - 'eu-west-1 | AWS 爱尔兰'
          - 'eu-west-3 | AWS 巴黎'
          - 'europe-west1 | GCP 比利时'
          - 'europe-west3 | GCP 法兰克福'
          - 'europe-west4 | GCP 荷兰'
          - 'eu-frankfurt-1 | OCI 法兰克福'
          - 'eu-paris-1 | OCI 巴黎'
          - 'westeurope | AZR 荷兰'
          - 'germanywestcentral | AZR 法兰克福'
          - 'francecentral | AZR 巴黎'
          - 'polandcentral | AZR 华沙'
          # ====== 欧洲北部 EU-NORTH ======
          - 'eu-north | 北欧（自动分配）'
          - 'eu-north-1 | AWS 斯德哥尔摩'
          - 'northeurope | AZR 爱尔兰'
          - 'swedencentral | AZR 瑞典'
          - 'norwayeast | AZR 奥斯陆'
          # ====== 欧洲南部 EU-SOUTH ======
          - 'eu-south | 欧洲南部（自动分配）'
          - 'eu-south-1 | AWS 米兰'
          - 'eu-south-2 | AWS 西班牙'
          - 'italynorth | AZR 米兰'
          - 'spaincentral | AZR 马德里'
          # ====== 亚太东北 AP-NORTHEAST ======
          - 'ap-northeast | 亚太东北（自动分配）'
          - 'ap-northeast-1 | AWS 东京'
          - 'ap-northeast-2 | AWS 首尔'
          - 'ap-northeast-3 | AWS 大阪'
          - 'asia-east1 | GCP 台湾'
          - 'asia-northeast1 | GCP 东京'
          - 'asia-northeast3 | GCP 首尔'
          - 'koreacentral | AZR 首尔'
