name: Modal 容器扎针

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          ref: modal

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install modal fastapi==0.115.12

      - name: 配置Modal令牌
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"

      - name: 创建或更新Modal密钥
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          echo y | modal secret delete nezha-secrets 2>/dev/null || true
          sleep 2
          modal secret create nezha-secrets \
            FILE_PATH="${{ secrets.FILE_PATH || '.cache' }}" \
            NEZHA_SERVER="${{ secrets.NEZHA_SERVER }}" \
            NEZHA_PORT="${{ secrets.NEZHA_PORT || '' }}" \
            NEZHA_KEY="${{ secrets.NEZHA_KEY }}" \
            UUID="${{ secrets.UUID || '' }}" \
            AUTO_ACCESS="${{ secrets.AUTO_ACCESS || 'true' }}" \
            KEEPALIVE_INTERVAL="${{ secrets.KEEPALIVE_INTERVAL || '120' }}"
          echo "Modal密钥创建成功。"

      - name: 部署到Modal并提取URL
        id: deploy
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          echo "正在部署到Modal..."
          OUTPUT=$(modal deploy app.py)
          echo "$OUTPUT"
          # 提取 URL（匹配 https:// 开头，.modal.run 结尾的字符串）
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.modal\.run')
          if [ -z "$URL" ]; then
            echo "错误：无法从部署输出中提取 URL"
            exit 1
          fi
          echo "DEPLOY_URL=$URL" >> $GITHUB_ENV
          echo "部署完成，应用 URL: $URL"

      - name: 触发初始保活请求
        run: |
          echo "等待部署稳定..."
          sleep 10
          echo "发送初始请求以触发URL自动检测..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            "${{ env.DEPLOY_URL }}/health" || true
          echo "初始保活触发完成。"
