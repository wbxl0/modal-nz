name: Modal 容器扎针

on:
  workflow_dispatch:
    inputs:
      deploy_region:
        description: '部署区域'
        required: false
        default: 'us-east'
        type: choice
        options:
          - us-east
          - us-central
          - us-west
          - eu-west
          - eu-north
          - ap-northeast
          - ap-southeast
          - ap-south
          - ca
          - uk
          - jp
          - me
          - sa

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          ref: modal

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install modal fastapi==0.115.12

      - name: 配置Modal令牌
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"

      - name: 创建或更新Modal密钥
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          echo y | modal secret delete nezha-secrets 2>/dev/null || true
          sleep 2
          modal secret create nezha-secrets \
            FILE_PATH="${{ secrets.FILE_PATH || '.cache' }}" \
            NEZHA_SERVER="${{ secrets.NEZHA_SERVER }}" \
            NEZHA_PORT="${{ secrets.NEZHA_PORT || '' }}" \
            NEZHA_KEY="${{ secrets.NEZHA_KEY }}" \
            UUID="${{ secrets.UUID || '' }}" \
            AUTO_ACCESS="${{ secrets.AUTO_ACCESS || 'true' }}" \
            KEEPALIVE_INTERVAL="${{ secrets.KEEPALIVE_INTERVAL || '120' }}" \
            DEPLOY_REGION="${{ github.event.inputs.deploy_region || 'us-east' }}"
          echo "Modal密钥创建成功。"

      - name: 设置部署区域环境变量
        run: |
          echo "DEPLOY_REGION=${{ github.event.inputs.deploy_region || 'us-east' }}" >> $GITHUB_ENV
          echo "部署区域: ${{ github.event.inputs.deploy_region || 'us-east' }}"

      - name: 部署到Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          DEPLOY_REGION: ${{ github.event.inputs.deploy_region || 'us-east' }}
        run: |
          echo "正在部署到Modal（区域: $DEPLOY_REGION）..."
          OUTPUT=$(modal deploy app.py 2>&1)
          echo "$OUTPUT"

          URL=$(echo "$OUTPUT" | grep -oP 'https://[a-zA-Z0-9._-]+\.modal\.run' | head -1)

          if [ -z "$URL" ]; then
            echo "::error::无法从部署输出中提取 URL"
            echo "部署输出内容："
            echo "$OUTPUT"
            exit 1
          fi

          echo "DEPLOY_URL=$URL" >> $GITHUB_ENV
          echo "✅ 部署完成"
          echo "   应用 URL: $URL"
          echo "   部署区域: $DEPLOY_REGION"

      - name: 触发初始保活请求
        run: |
          echo "等待部署稳定..."
          sleep 10

          echo "发送初始请求到: $DEPLOY_URL/health"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" || echo "000")
          echo "第1次请求 -> HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "冷启动中，15秒后重试..."
            sleep 15
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" || echo "000")
            echo "第2次请求 -> HTTP $HTTP_STATUS"
          fi

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "再等20秒重试最后一次..."
            sleep 20
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" || echo "000")
            echo "第3次请求 -> HTTP $HTTP_STATUS"
          fi

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ 保活触发成功！"
          else
            echo "⚠️ 返回 HTTP $HTTP_STATUS，容器可能仍在启动中"
          fi
