          - 'ap-melbourne | 亚太墨尔本（自动分配）'
          - 'ap-melbourne-1 | OCI 墨尔本'
          # ====== 澳大利亚 AUSTRALIA (Alias) ======
          - 'au | 澳大利亚（别名）'
          - 'australia-southeast1 | GCP 悉尼'
          - 'ap-sydney-1 | OCI 悉尼'
          - 'australiaeast | AZR 悉尼'
          # ====== 英国 UK ======
          - 'uk | 英国（自动分配）'
          - 'eu-west-2 | AWS 伦敦'
          - 'europe-west2 | GCP 伦敦'
          - 'uk-london-1 | OCI 伦敦'
          - 'uksouth | AZR 伦敦'
          - 'ukwest | AZR 卡迪夫'
          # ====== 加拿大 CA ======
          - 'ca | 加拿大（自动分配）'
          - 'ca-central-1 | AWS 蒙特利尔'
          - 'northamerica-northeast2 | GCP 多伦多'
          - 'ca-toronto-1 | OCI 多伦多'
          - 'ca-montreal-1 | OCI 蒙特利尔'
          - 'canadacentral | AZR 多伦多'
          - 'canadaeast | AZR 魁北克'
          # ====== 中东 ME ======
          - 'me | 中东（自动分配）'
          - 'me-west1 | GCP 特拉维夫'
          - 'uaenorth | AZR 迪拜'
          - 'qatarcentral | AZR 多哈'
          # ====== 南美 SA ======
          - 'sa | 南美（自动分配）'
          - 'sa-east-1 | AWS 圣保罗'
          - 'southamerica-east1 | GCP 圣保罗'
          - 'brazilsouth | AZR 圣保罗'
          # ====== 非洲 AF ======
          - 'af | 非洲（自动分配）'
          - 'southafricanorth | AZR 约翰内斯堡'
          # ====== 墨西哥 MX ======
          - 'mx | 墨西哥（自动分配）'
          - 'mexicocentral | AZR 墨西哥城'
          # ====== 日本 JP (Alias) ======
          - 'jp | 日本（别名）'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 解析部署区域
        run: |
          FULL_INPUT="${{ github.event.inputs.deploy_region }}"
          REGION=$(echo "$FULL_INPUT" | cut -d'|' -f1 | xargs)
          REGION_DESC=$(echo "$FULL_INPUT" | cut -d'|' -f2 | xargs)
          echo "DEPLOY_REGION=$REGION" >> $GITHUB_ENV
          echo "REGION_DESC=$REGION_DESC" >> $GITHUB_ENV
          echo "📍 部署区域: $REGION ($REGION_DESC)"

      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          ref: main  # 分支

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install modal fastapi==0.115.12

      - name: 配置Modal令牌
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal token set --token-id "$MODAL_TOKEN_ID" --token-secret "$MODAL_TOKEN_SECRET"

      - name: 创建或更新Modal密钥
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          echo y | modal secret delete nezha-secrets 2>/dev/null || true
          sleep 2
          modal secret create nezha-secrets \
            FILE_PATH="${{ secrets.FILE_PATH || '.cache' }}" \
            NEZHA_SERVER="${{ secrets.NEZHA_SERVER }}" \
            NEZHA_PORT="${{ secrets.NEZHA_PORT || '' }}" \
            NEZHA_KEY="${{ secrets.NEZHA_KEY }}" \
            UUID="${{ secrets.UUID || 'b249d7ad-3331-4fc3-b1b4-d412fe0d4414' }}" \
            AUTO_ACCESS="${{ secrets.AUTO_ACCESS || 'true' }}" \
            KEEPALIVE_INTERVAL="${{ secrets.KEEPALIVE_INTERVAL || '120' }}" \
            DEPLOY_REGION="$DEPLOY_REGION"   # 将区域注入 secret
          echo "✅ Modal密钥创建成功（区域: $DEPLOY_REGION - $REGION_DESC）"

      - name: 部署到Modal
        id: deploy
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          echo "🚀 正在部署到Modal..."
          echo "   📍 区域: $DEPLOY_REGION ($REGION_DESC) (通过环境变量传递)"
          OUTPUT=$(modal deploy app.py 2>&1)   # 移除 --region
          echo "$OUTPUT"

          URL=$(echo "$OUTPUT" | grep -oP 'https://[a-zA-Z0-9._-]+\.modal\.run' | head -1)

          if [ -z "$URL" ]; then
            echo "::error::无法从部署输出中提取 URL"
            echo "$OUTPUT"
            exit 1
          fi

          echo "DEPLOY_URL=$URL" >> $GITHUB_ENV
          echo ""
          echo "✅ 部署完成"
          echo "   📍 区域: $DEPLOY_REGION ($REGION_DESC)"
          echo "   🔗 URL: $URL"

      - name: 触发初始保活请求
        run: |
          echo "⏳ 等待部署稳定..."
          sleep 10
          echo "📡 发送初始请求到: $DEPLOY_URL/health"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" || echo "000")
          echo "第1次请求 -> HTTP $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "冷启动中，15秒后重试..."
            sleep 15
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" || echo "000")
            echo "第2次请求 -> HTTP $HTTP_STATUS"
          fi
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "再等20秒重试最后一次..."
            sleep 20
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL/health" || echo "000")
            echo "第3次请求 -> HTTP $HTTP_STATUS"
          fi
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ 保活触发成功！"
            echo "   📍 区域: $DEPLOY_REGION ($REGION_DESC)"
            echo "   🔗 URL: $DEPLOY_URL"
          else
            echo "⚠️ 返回 HTTP $HTTP_STATUS，容器可能仍在启动中"
          fi
